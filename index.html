<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var setter = function(val) {
            originalFetch = val;
          };
          var getter = function() {
            return originalFetch;
          };
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: getter,
            set: setter
          });
          if (typeof globalThis !== 'undefined') {
            Object.defineProperty(globalThis, 'fetch', {
              configurable: true,
              enumerable: true,
              get: getter,
              set: setter
            });
          }
        } catch (e) {
          console.warn("Fetch safeguard not applied:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <title>TikScope — AI-Powered Creator Intelligence Tool</title>
  </head>

</html>
